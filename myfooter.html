
<!DOCTYPE html>
<html lang="en">
<head>


<div class="movie-container">
<h2 class="section-title">Latest</h2>
<div id="movie-grid"></div>
</div>

<style>
.post-container{
max-width:800px;
margin:40px auto;
padding:25px;
background:#fff;
border-radius:12px;
}

h1{
text-align:center;
font-size:34px;
margin-bottom:30px;
}

h2{
margin-top:45px;
font-size:26px;
}

h3{
margin-top:25px;
font-size:21px;
}

p{
font-size:20px;
margin-bottom:16px;
}

ul{
margin-left:20px;
}

.tip-box{
background:#e8f7ff;
border-left:5px solid #2196f3;
padding:15px;
margin:20px 0;
border-radius:6px;
}

.highlight-box{
background:#fff8e1;
border-left:5px solid #ff9800;
padding:15px;
margin:20px 0;
border-radius:6px;
}

.footer{
background:#111;
padding:20px;
text-align:center;
}

.footer a{
color:#04ff00;
text-decoration:none;
margin:0 6px;
}

.footer p{
color:#aaa;
font-size:14px;
}

/* ===============================
   GLOBAL RESET
================================= */
body {
  margin: 0;
  padding: 0;
  font-family: Raleway, Arial, sans-serif;
}


/* ===============================
   HEADER AD
================================= */
#header-ad {
  margin: 15px auto;
  background: #fff;
  border-radius: 12px;
  padding: 8px;
  text-align: center;
  width: 200px;
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
}

.ad-label {
  font-size: 12px;
  color: #666;
  margin-bottom: 5px;
  display: block;
}

/* ===============================
   FOOTER CSS (ready for future use)
================================= */
.site-footer {
  background: #f9f9f9;
  border-top: 1px solid #e5e5e5;
  color: #333;
}

.footer-container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 30px;
}

.footer-column h4 {
  font-size: 16px;
  margin-bottom: 15px;
  color: #111;
}

.footer-column ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

.footer-column li {
  margin-bottom: 10px;
}

.footer-column a {
  text-decoration: none;
  color: #555;
  transition: 0.3s ease;
}

.footer-column a:hover {
  color: #1a73e8;
}

.footer-bottom {
  text-align: center;
  padding: 15px;
  font-size: 13px;
  color: #777;
  background: #f1f1f1;
}

/* ===============================
   RESPONSIVE
================================= */
@media (max-width: 800px) {
  .menu-grid {
    grid-template-columns: 1fr;
    gap: 20px;
  }

.post-body ins.adsbygoogle {
  max-width: 500px;
  margin: 0 auto !important;
}
  .menu-left,
  .menu-right {
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
  }

  .search-column {
    order: -1;
  }
}

.movie-container{
  max-width:1200px;
  margin:30px auto;
  padding:10px;
  font-family:Arial,sans-serif;
}

.section-title{
  font-size:24px;
  font-weight:700;
  margin-bottom:20px;
  border-left:5px solid #e50914;
  padding-left:10px;
}

#movie-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:16px;
}

.movie-card{
  background:#fff;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.15);
  transition:transform .2s;
}

.movie-card:hover{
  transform:translateY(-5px);
}

.poster{
  position:relative;
  width:100%;
  height:180px;
  overflow:hidden;
}

.poster img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.play-icon{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  background:#e50914;
  color:#fff;
  width:50px;
  height:50px;
  line-height:50px;
  border-radius:50%;
  text-align:center;
}

.movie-title{
  padding:10px;
  font-size:15px;
  font-weight:600;
  color:#111;
}

.movie-ad{
  grid-column:1/-1;
  text-align:center;
  margin:20px 0;
}
</style>

<script>

function loadMovies(json){

var grid=document.getElementById("movie-grid");
var posts=json.feed.entry;

posts.forEach(function(entry,i){

var title=entry.title.$t;
var link=entry.link.find(l=>l.rel=="alternate").href;

var img="https://via.placeholder.com/400x250?text=Movie";

if(entry.media$thumbnail){
img=entry.media$thumbnail.url.replace("/s72-c/","/s640/");
}

var card=document.createElement("div");
card.className="movie-card";

card.innerHTML=`

<a href="${link}" target="_blank" rel="noopener noreferrer" title="${title}">

<div class="poster">
<img src="${img}" alt="${title}">
<div class="play-icon">&#9658;</div>
</div>

<div class="movie-title">${title}</div>

</a>

`;

grid.appendChild(card);


if((i+1)%8==0){

var ad=document.createElement("div");
ad.className="movie-ad";

ad.innerHTML=`

<!-- Responsive AMP Ad -->
<amp-ad width="100vw"
height="320"
type="adsense"
data-ad-client="ca-pub-2269884583846743"
data-ad-slot="7284297604"
data-auto-format="rspv"
data-full-width="">
<div overflow></div>
</amp-ad>

<br>

<!-- 300x250 AMP Ad -->
<amp-ad
layout="fixed"
width="300"
height="250"
type="adsense"
data-ad-client="ca-pub-2269884583846743"
data-ad-slot="2359999321">
</amp-ad>

`;

grid.appendChild(ad);

}

});

}

</script>

<!-- ONE FEED -->
<script src="https://www.marketing2advertising.com/feeds/posts/default/-/movies1000?alt=json-in-script&max-results=16&callback=loadMovies"></script>

    <a href="https://www.marketing2advertising.com/terms-and-conditions" target="_blank" rel="noopener noreferrer">Terms</a>
    <p>© Marketing2Advertising. All rights reserved.</p>
  </div>
</footer>

</body>
</html>
