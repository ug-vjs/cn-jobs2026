<script>
(function(){
  const video = document.getElementById("videoPlayer");
  const overlay = document.getElementById("adOverlay");
  const skipBtn = document.getElementById("skipAdBtn");
  const countdown = document.getElementById("adCountdown");
  const adContainer = document.getElementById("adContainer");

  const playPauseBtn = document.getElementById("playPauseBtn");
  const backBtn = document.getElementById("backBtn");
  const forwardBtn = document.getElementById("forwardBtn");
  const progressBar = document.getElementById("progressBar");
  const volumeSlider = document.getElementById("volumeSlider");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const stillBox = document.getElementById("stillWatching");
  const continueBtn = document.getElementById("continueWatching");
  const controls = document.getElementById("custom-controls");

  const loader = document.getElementById("video-loader");
  const currentTimeEl = document.getElementById("currentTime");
  const durationEl = document.getElementById("duration");

  /* ----------- Pre-roll Ad List ----------- */
  const preRollAds = [
    { client:"ca-pub-2269884583846743", slot:"2359999321", width:300, height:250 },
    { client:"ca-pub-2269884583846743", slot:"5369359940", width:250, height:350 },
    { client:"ca-pub-2269884583846743", slot:"4256856469", width:250, height:250 }
  ];

  let adIndex = 0;
  let adPlayed = false;
  let countdownTimer;
  let adInterval;
  let fullscreenExitTimer;
  let stillTimer;
  let hideControlsTimer;

  /* ----------- LOAD ADS ----------- */
  function loadAd(ad){
    adContainer.innerHTML = "";
    const ins = document.createElement("ins");
    ins.className = "adsbygoogle";
    ins.style.display = "inline-block";
    ins.style.width = ad.width + "px";
    ins.style.height = ad.height + "px";
    ins.setAttribute("data-ad-client", ad.client);
    ins.setAttribute("data-ad-slot", ad.slot);
    adContainer.appendChild(ins);
    (adsbygoogle = window.adsbygoogle || []).push({});
  }

  /* ----------- SHOW PRE-ROLL AD ----------- */
  function showAd(seconds=7){
    overlay.style.display="flex";
    video.pause();
    skipBtn.style.display="none";

    // Load current ad
    loadAd(preRollAds[adIndex]);
    adIndex = (adIndex + 1) % preRollAds.length;

    let timeLeft = seconds;
    countdown.innerText = "Ad: "+timeLeft;

    countdownTimer = setInterval(()=>{
      timeLeft--;
      countdown.innerText = "Ad: "+timeLeft;
      if(timeLeft <= 0){
        clearInterval(countdownTimer);
        skipBtn.style.display="inline-block";
      }
    },1000);

    skipBtn.onclick = function(){
      overlay.style.display="none";
      video.play();
    };
  }

  /* ---------- FIRST PLAY PRE-ROLL + AUTO FULLSCREEN ---------- */
  video.addEventListener("play", function firstPlay(){
    if(!adPlayed){
      // Go fullscreen when first play
      if(!document.fullscreenElement) video.parentElement.requestFullscreen().catch(()=>{});
      showAd(7);
      adPlayed=true;
    }
    video.removeEventListener("play", firstPlay);
  });

  /* ---------- CUSTOM CONTROLS ---------- */
  playPauseBtn.onclick=()=>{
    if(video.paused){
      // Auto fullscreen on play from button
      if(!document.fullscreenElement) video.parentElement.requestFullscreen().catch(()=>{});
      video.play();
    }else{
      video.pause();
    }
  };
  backBtn.onclick=()=>video.currentTime=Math.max(0,video.currentTime-10);
  forwardBtn.onclick=()=>video.currentTime=Math.min(video.duration,video.currentTime+10);
  volumeSlider.oninput=()=>video.volume=volumeSlider.value;
  fullscreenBtn.onclick=()=>{ 
    if(!document.fullscreenElement) video.parentElement.requestFullscreen();
    else document.exitFullscreen();
  };
  video.onplay=()=>playPauseBtn.textContent="Pause";
  video.onpause=()=>playPauseBtn.textContent="Play";
  video.onloadedmetadata=()=>{progressBar.max=video.duration; durationEl.textContent=format(video.duration);};
  video.ontimeupdate=()=>{progressBar.value=video.currentTime; currentTimeEl.textContent=format(video.currentTime);};
  progressBar.oninput=()=>video.currentTime=progressBar.value;

  function format(s){const m=Math.floor(s/60); const sec=Math.floor(s%60); return m+":"+(sec<10?"0":"")+sec;}

  video.onwaiting=()=>loader.style.display="flex";
  video.onplaying=()=>loader.style.display="none";
  video.oncanplay=()=>loader.style.display="none";

  /* ---------- STILL WATCHING 40 MIN ---------- */
function startStillTimer(){
  clearTimeout(stillTimer);
  stillTimer = setTimeout(()=>{
    video.pause();
    stillBox.style.display = "flex";
  }, 2400000); // 40 minutes in milliseconds
}
video.addEventListener("play", startStillTimer);
continueBtn.onclick = ()=>{ stillBox.style.display = "none"; video.play(); };

  /* ---------- ROTATING AD EVERY 20 MIN ---------- */
video.addEventListener("play",()=>{
  adInterval=setInterval(()=>{
    if(!video.paused) showAd(7);  // Show pre-roll ad for 7 seconds
  },1200000); // 20 minutes in milliseconds
});
video.addEventListener("pause",()=>clearInterval(adInterval));

  /* ---------- FULLSCREEN EXIT EVERY 15 MIN ---------- */
  video.addEventListener("play",()=>{
    fullscreenExitTimer=setInterval(()=>{
      if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    },900000);
  });
  video.addEventListener("pause",()=>clearInterval(fullscreenExitTimer));

  /* ---------- AUTO HIDE CONTROLS (YouTube Style) ---------- */
  controls.style.transition = "opacity 0.3s ease";
  function showControls(){
    controls.style.opacity="1";
    controls.style.pointerEvents="auto";
    clearTimeout(hideControlsTimer);
    hideControlsTimer=setTimeout(()=>{
      if(!video.paused) {
        controls.style.opacity="0";
        controls.style.pointerEvents="none";
      }
    },3000);
  }
  video.parentElement.addEventListener("mousemove", showControls);
  video.parentElement.addEventListener("touchstart", showControls);
  video.addEventListener("play", showControls);
  video.addEventListener("pause", ()=>{controls.style.opacity="1"; controls.style.pointerEvents="auto";});

  /* ---------- SAVE RESUME POSITION ---------- */
  setInterval(()=>{
    if(!video.paused && video.currentTime>0){
      localStorage.setItem("resumeTime", Math.floor(video.currentTime));
    }
  },2000);

  function getResumeTime(){
    const url=new URLSearchParams(location.search).get("t");
    const saved=localStorage.getItem("resumeTime");
    return url || saved;
  }

  function resumeVideo(time){
    if(!time) return;
    time=parseInt(time);
    const attemptSeek=()=>{
      if(video.readyState>=2){
        video.currentTime=time;
        video.play().catch(()=>{});
        localStorage.removeItem("resumeTime");
      }else{
        setTimeout(attemptSeek,200);
      }
    };
    attemptSeek();
  }

  window.addEventListener("load",()=>{
    const t=getResumeTime();
    if(t) resumeVideo(t);
  });

})();
</script>
