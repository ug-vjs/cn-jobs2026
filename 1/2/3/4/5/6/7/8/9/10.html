<style>
.news-container {
  display: flex;
  flex-direction: column;
  gap: 30px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 10px;
  font-family: Arial, sans-serif;

  border-radius: 8px;

}

.movie-card:hover {
  transform: translateY(-3px);
}

.poster {
  width: 100%;
  height: 180px;
  overflow: hidden;
  position: relative;
}

.movie-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 28px;

  border-radius: 50%;
  width: 45px;
  height: 45px;
  line-height: 45px;
  text-align: center;
  box-shadow: 0 0 15px #e50914;
  pointer-events: none;
}

<!--===================== JavaScript =====================-->
<script>
var allFeedEntries = [];
var feedsLoaded = 0;
var totalFeeds = 10;

// Map categories to container IDs
var categoryMap = {
  "movies": "movies-grid",
  "info": "news-grid",
  "finance": "money-grid",
  "moneypower": "money-grid",
  "storytelling": "updates-grid",
  "games": "games-grid",
  "courses": "updates-grid"
};

// Render top post from each category in featured section
var featuredTracker = {};

function renderMovieFeedRow(json) {
  if(json.feed && json.feed.entry){
    allFeedEntries = allFeedEntries.concat(json.feed.entry);
  }
  feedsLoaded++;
  if(feedsLoaded >= totalFeeds){
    // Sort by published date descending (newest first)
    allFeedEntries.sort((a,b)=>{
      return new Date(b.published.$t) - new Date(a.published.$t);
    });

    allFeedEntries.forEach(entry=>{
      var cat = entry.category ? entry.category[0].term.toLowerCase() : "updates";
      var containerId = categoryMap[cat] || "updates-grid";

      // Featured: Only first post per category
      if(!featuredTracker[cat]){
        renderMovieCard(entry, "featured-movie-grid");
        featuredTracker[cat] = true;
      }

      renderMovieCard(entry, containerId);
    });
  }
}

function renderMovieCard(entry, containerId){
  var title = entry.title.$t;
  var url = entry.link.find(l=>l.rel==='alternate')?.href || '#';
  var imgUrl = entry.media$thumbnail?.url.replace('/s72-c/', '/s640/') || 
               entry.content?.$t.match(/<img[^>]+src="([^">]+)"/)?.[1] || 
               'https://via.placeholder.com/300x450?text=No+Image';

  var card = document.createElement('div');
  card.className = 'movie-card';
  card.innerHTML = `
    <a href="${url}" target="_blank" rel="noopener" title="${title}">
      <div class="poster">
        <img src="${imgUrl}" alt="${title}">
        <div class="play-button">&#9658;</div>
      </div>
      <div class="movie-title">${title}</div>
    </a>
  `;

  var container = document.getElementById(containerId);
  container.appendChild(card);

  // Ad every 9 posts
  if(container.children.length % 9 === 0){
    var adDiv = document.createElement('div');
    adDiv.className = 'movie-ad';
    adDiv.innerHTML = `
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-2269884583846743"
           data-ad-slot="2359999321"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
    `;
    container.appendChild(adDiv);
    (adsbygoogle = window.adsbygoogle || []).push({});
  }
}
</script>
